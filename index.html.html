<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Abyssal Treasure Hunt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#020e18;font-family:'Trebuchet MS',system-ui,sans-serif;touch-action:none;overscroll-behavior:none;position:fixed}
canvas{display:block;position:absolute;inset:0}
#hud{position:absolute;top:0;left:0;right:0;padding:max(10px,env(safe-area-inset-top)) 14px 0;display:flex;align-items:center;gap:10px;pointer-events:none;z-index:5}
#o2wrap{flex:1;max-width:300px}
#o2lab{font-size:11px;letter-spacing:1px;color:#9fd9ef;text-transform:uppercase;margin-bottom:3px;text-shadow:0 1px 3px #000}
#o2bg{height:12px;background:rgba(3,20,33,.7);border:1px solid rgba(130,220,255,.35);border-radius:7px;overflow:hidden}
#o2f{height:100%;width:100%;background:linear-gradient(90deg,#27c2ff,#6df0d8);border-radius:7px;transition:width .2s}
#frags{display:flex;gap:5px;align-items:center}
.fr{width:22px;height:22px;border-radius:5px;border:1px solid rgba(150,225,255,.3);background:rgba(3,20,33,.6);display:flex;align-items:center;justify-content:center;font-size:13px;filter:grayscale(1) opacity(.4)}
.fr.on{filter:none;background:rgba(20,70,60,.7);box-shadow:0 0 8px rgba(110,240,200,.5)}
#lvlname{position:absolute;top:max(44px,calc(env(safe-area-inset-top) + 36px));left:14px;font-size:12px;color:#7fc6de;letter-spacing:2px;text-transform:uppercase;text-shadow:0 1px 3px #000;pointer-events:none;z-index:5}
#bossbar{position:absolute;top:max(64px,calc(env(safe-area-inset-top) + 56px));left:50%;transform:translateX(-50%);width:min(70%,420px);display:none;z-index:5;pointer-events:none}
#bosslab{text-align:center;font-size:12px;letter-spacing:2px;color:#ffb1a3;text-transform:uppercase;margin-bottom:3px;text-shadow:0 1px 4px #000}
#bossbg{height:10px;background:rgba(30,5,8,.75);border:1px solid rgba(255,120,110,.4);border-radius:6px;overflow:hidden}
#bossf{height:100%;width:100%;background:linear-gradient(90deg,#ff5c4d,#ffb13d);border-radius:6px}
#toast{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);font-size:clamp(15px,3.6vw,22px);color:#dff6ff;letter-spacing:2px;text-align:center;text-shadow:0 0 14px rgba(90,210,255,.8),0 2px 4px #000;opacity:0;transition:opacity .4s;pointer-events:none;z-index:6;padding:0 20px}
#joy{position:absolute;left:18px;bottom:max(18px,env(safe-area-inset-bottom));width:118px;height:118px;border-radius:50%;border:2px solid rgba(140,225,255,.3);background:rgba(8,30,48,.35);z-index:8;display:none}
#knob{position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(170,235,255,.9),rgba(40,140,190,.85));transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(80,200,255,.5)}
#fire{position:absolute;right:20px;bottom:max(26px,calc(env(safe-area-inset-bottom) + 8px));width:84px;height:84px;border-radius:50%;border:2px solid rgba(255,170,120,.45);background:radial-gradient(circle at 35% 30%,rgba(255,140,90,.5),rgba(140,40,20,.55));color:#ffe3d0;font-size:13px;letter-spacing:1px;z-index:8;display:none;align-items:center;justify-content:center;font-weight:700;text-shadow:0 1px 3px #000}
#fire:active{transform:scale(.93)}
#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(1,8,14,.55);backdrop-filter:blur(3px);z-index:10;padding:16px}
.panel{width:min(440px,94vw);max-height:86vh;overflow-y:auto;background:linear-gradient(180deg,rgba(6,28,44,.96),rgba(3,14,24,.97));border:1px solid rgba(120,215,255,.3);border-radius:18px;padding:22px 22px 20px;color:#cfeaf5;box-shadow:0 0 40px rgba(30,150,210,.25),inset 0 0 60px rgba(20,90,130,.12);text-align:center}
.panel h1{font-size:clamp(20px,5.5vw,27px);letter-spacing:3px;color:#eafaff;text-transform:uppercase;text-shadow:0 0 16px rgba(90,210,255,.7);margin-bottom:4px;font-weight:700}
.panel h2{font-size:clamp(15px,4.4vw,19px);letter-spacing:2px;color:#bfeeff;margin-bottom:8px}
.panel p{font-size:14px;line-height:1.65;color:#a8cddd;margin:8px 0}
.panel .gem{font-size:38px;margin-bottom:4px;filter:drop-shadow(0 0 12px rgba(110,240,210,.8))}
.riddle{font-style:italic;background:rgba(10,45,68,.5);border:1px solid rgba(120,215,255,.2);border-radius:12px;padding:12px;color:#d6f1fb;font-size:14px;line-height:1.7;margin:10px 0}
.btn{display:inline-block;min-height:48px;padding:12px 22px;margin:6px 4px;border-radius:12px;border:1px solid rgba(140,230,255,.45);background:linear-gradient(180deg,rgba(30,110,160,.6),rgba(12,55,85,.7));color:#eafaff;font-size:15px;letter-spacing:1px;cursor:pointer;font-family:inherit;font-weight:700}
.btn:active{transform:scale(.96)}
.btn.gold{border-color:rgba(255,210,120,.5);background:linear-gradient(180deg,rgba(180,120,30,.55),rgba(110,65,10,.65));color:#ffeecf}
.bell{width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,210,120,.4);background:rgba(60,40,10,.5);color:#ffe9bd;font-size:17px;margin:5px;cursor:pointer;font-weight:700;font-family:inherit}
.bell.sel{background:linear-gradient(180deg,rgba(255,190,80,.75),rgba(170,100,20,.8));box-shadow:0 0 14px rgba(255,200,100,.7);color:#3a2300}
.tin{width:100%;min-height:48px;border-radius:12px;border:1px solid rgba(140,230,255,.4);background:rgba(5,25,40,.8);color:#eafaff;font-size:16px;padding:10px 14px;text-align:center;letter-spacing:1px;margin:8px 0;font-family:inherit}
.tin:focus{outline:none;border-color:rgba(140,230,255,.8)}
.msg{min-height:20px;font-size:13px;margin-top:6px}
.msg.bad{color:#ff9e92}.msg.good{color:#8df0cf}
.small{font-size:12px;color:#6fa6ba}
#ctrlhint{font-size:12px;color:#7fb8cc;margin-top:10px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="o2wrap"><div id="o2lab">Oxygen</div><div id="o2bg"><div id="o2f"></div></div></div>
  <div id="frags">
    <div class="fr" id="f0">🗺️</div><div class="fr" id="f1">🗺️</div><div class="fr" id="f2">🗺️</div><div class="fr" id="f3">🧭</div><div class="fr" id="f4">🗺️</div>
  </div>
</div>
<div id="lvlname"></div>
<div id="bossbar"><div id="bosslab"></div><div id="bossbg"><div id="bossf"></div></div></div>
<div id="toast"></div>
<div id="joy"><div id="knob"></div></div>
<button id="fire">FIRE</button>
<div id="ov"></div>
<script>
"use strict";
const TAU=Math.PI*2;
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy};
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);resize();

/* ---------- audio ---------- */
let AC=null;
function snd(f,d,type,vol){try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.setValueAtTime(vol||.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sFire=()=>snd(560,.12,'square',.05),sHit=()=>snd(110,.25,'sawtooth',.09),sPick=()=>snd(880,.18,'sine',.07),sGood=()=>{snd(660,.15,'sine',.07);setTimeout(()=>snd(990,.25,'sine',.07),120)},sBad=()=>snd(140,.4,'sawtooth',.08),sBoom=()=>snd(70,.6,'sawtooth',.12);

/* ---------- input ---------- */
const keys={};let fireHeld=false;
window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')fireHeld=true;if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='Space')fireHeld=false;});
const joyEl=document.getElementById('joy'),knob=document.getElementById('knob'),fireBtn=document.getElementById('fire');
const joy={on:false,id:null,dx:0,dy:0};
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
function showTouchUI(s){joyEl.style.display=s?'block':'none';fireBtn.style.display=s?'flex':'none';}
function joyCenter(){const r=joyEl.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function setKnob(dx,dy){knob.style.transform=`translate(calc(-50% + ${dx*36}px),calc(-50% + ${dy*36}px))`;}
window.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(t.clientX<W*.5&&t.clientY>H*.35&&!joy.on){joy.on=true;joy.id=t.identifier;const c=joyCenter();const dx=(t.clientX-c.x)/46,dy=(t.clientY-c.y)/46;const m=Math.hypot(dx,dy)||1;joy.dx=Math.abs(dx)>1||Math.abs(dy)>1?dx/m:dx;joy.dy=Math.abs(dx)>1||Math.abs(dy)>1?dy/m:dy;setKnob(joy.dx,joy.dy);}
  }
},{passive:true});
window.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(joy.on&&t.identifier===joy.id){const c=joyCenter();let dx=(t.clientX-c.x)/46,dy=(t.clientY-c.y)/46;const m=Math.hypot(dx,dy);if(m>1){dx/=m;dy/=m;}joy.dx=dx;joy.dy=dy;setKnob(dx,dy);}
  }
  e.preventDefault();
},{passive:false});
window.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){if(joy.on&&t.identifier===joy.id){joy.on=false;joy.dx=0;joy.dy=0;setKnob(0,0);}}
},{passive:true});
fireBtn.addEventListener('touchstart',e=>{fireHeld=true;e.stopPropagation();},{passive:true});
fireBtn.addEventListener('touchend',e=>{fireHeld=false;e.stopPropagation();},{passive:true});
fireBtn.addEventListener('mousedown',()=>fireHeld=true);
fireBtn.addEventListener('mouseup',()=>fireHeld=false);

/* ---------- level data ---------- */
const LV=[
{name:"Level 1 · Coral Kingdom",top:"#2a9cc7",bot:"#06334e",deco:"coral",rays:true,dark:0,
 foes:[["needle",5],["eel",2],["stone",2]],
 puzzle:{type:"choice",title:"The Three Coral Gates",text:'Gate A: “The treasure is behind Gate B.”<br>Gate B: “This gate is safe.”<br>Gate C: “Both other signs are false.”<br><br>Only ONE sign is true. Which gate do you open?',opts:["Gate A","Gate B","Gate C"],ans:2,why:"Only Gate C can be the lone truth — so A lies (nothing behind B) and B lies (B is a trap). Gate C opens."},
 boss:{id:"crab",name:"King Clawfin",hp:70},
 reward:{frag:0,text:"Map Fragment #1 + Oxygen Tank Upgrade (max oxygen +25)",fx:()=>{G.maxO2+=25;G.o2=G.maxO2;}}},
{name:"Level 2 · The Sunken Fleet",top:"#15394f",bot:"#040b13",deco:"wreck",rays:false,dark:0,
 foes:[["jelly",4],["shark",2],["skel",3]],
 puzzle:{type:"bells",title:"The Five Ship Bells",text:"Ring only the bells whose positions are <b>prime numbers</b>.<br>The wrong toll wakes the bone sharks.",ans:[2,3,5],why:"2, 3 and 5 are prime. The fleet stays silent."},
 boss:{id:"shark",name:"The Iron Jaw Shark",hp:90},
 reward:{frag:1,text:"Map Fragment #2 + Sonar Scanner (+20 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+20);}}},
{name:"Level 3 · Abyssal Forest",top:"#073a35",bot:"#01100e",deco:"kelp",rays:false,dark:.55,
 foes:[["squid",3],["eye",3],["lant",2]],
 puzzle:{type:"text",title:"The Glowing Stone",text:"“I speak without a mouth.<br>I hear without ears.<br>I disappear when you talk.<br><br>What am I?”",ans:"echo",why:"An echo. The hidden cave grinds open."},
 boss:{id:"kraken",name:"The Kraken Spawn",hp:110},
 reward:{frag:2,text:"Map Fragment #3 + Stealth Module (+20 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+20);}}},
{name:"Level 4 · The Frozen Trench",top:"#27617e",bot:"#0a2434",deco:"ice",rays:false,dark:0,
 foes:[["serp",2],["pira",5],["ray",2]],
 puzzle:{type:"choice",title:"The Three Levers",text:'Levers in order: <b>Blue · Red · Green</b>.<br>The frost-etched message reads:<br>“Pull the lever that is neither first nor last.”<br>A wrong pull floods the chamber.',opts:["Blue","Red","Green"],ans:1,why:"Neither first nor last — the middle lever. Red."},
 boss:{id:"levi",name:"Leviathan of Ice",hp:130},
 reward:{frag:3,text:"The Ancient Compass (+20 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+20);}}},
{name:"Level 5 · City of Lost Tides",top:"#3a2a63",bot:"#0d081f",deco:"ruins",rays:false,dark:.25,
 foes:[["phan",3],["hydra",2],["guard",2]],
 puzzle:{type:"choice",title:"The Statue's Two Chests",text:'Gold chest: “The treasure is not here.”<br>Silver chest: “The treasure is in the gold chest.”<br><br>Exactly one sign lies. Which chest do you open?',opts:["Gold Chest","Silver Chest"],ans:0,why:"If silver tells the truth, gold's sign is the single lie — the treasure sits in the gold chest."},
 boss:{id:"twins",name:"The Twin Sea Dragons",hp:150},
 reward:{frag:4,text:"The Final Map Fragment — the map is complete! (+25 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+25);}}},
{name:"Final · The Abyss of Eternity",top:"#0b0d18",bot:"#000002",deco:"vents",rays:false,dark:.8,
 foes:[["angler",3],["nsquid",3],["whale",1]],
 puzzle:{type:"text",title:"The Ancient Door",text:"“The more you take,<br>the more you leave behind.<br><br>What am I?”",ans:"footsteps",why:"Footsteps. The door opens onto the treasure chamber — and Morgath is waiting."},
 boss:{id:"morgath",name:"Morgath the Deep",hp:220},
 reward:{frag:-1,text:"",fx:()=>{}}}
];

/* ---------- game state ---------- */
const G={state:"title",lvl:0,o2:100,maxO2:100,frags:[false,false,false,false,false],pearls:0,pearlsNeed:3,t:0,shake:0,phase:1};
const P={x:0,y:0,vx:0,vy:0,face:1,kick:0,inv:0,fireCd:0,tilt:0};
let enemies=[],pearls=[],bullets=[],eb=[],parts=[],deco=[],boss=null,gate=null;
const hudO2=document.getElementById('o2f'),lvlNameEl=document.getElementById('lvlname'),bossBar=document.getElementById('bossbar'),bossF=document.getElementById('bossf'),bossLab=document.getElementById('bosslab'),toastEl=document.getElementById('toast'),ov=document.getElementById('ov');
function hud(){hudO2.style.width=clamp(G.o2/G.maxO2*100,0,100)+"%";hudO2.style.background=G.o2<G.maxO2*.3?"linear-gradient(90deg,#ff6a5a,#ffb13d)":"linear-gradient(90deg,#27c2ff,#6df0d8)";for(let i=0;i<5;i++)document.getElementById('f'+i).className='fr'+(G.frags[i]?' on':'');}
let toastT=null;
function toast(t,ms){toastEl.innerHTML=t;toastEl.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>toastEl.style.opacity=0,ms||2200);}

/* ---------- particles ---------- */
function bubble(x,y,s,vy){if(parts.length>140)return;parts.push({k:"b",x,y,r:s||rnd(1.5,4),vy:vy||rnd(-40,-18),vx:rnd(-6,6),a:rnd(.25,.6),t:0,life:rnd(1.5,3)});}
function spark(x,y,col,n){for(let i=0;i<(n||8);i++){if(parts.length>180)break;const a=rnd(0,TAU),sp=rnd(30,140);parts.push({k:"s",x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rnd(1.5,3.5),col,t:0,life:rnd(.3,.7),a:1});}}
function updParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.t+=dt;if(p.t>p.life){parts.splice(i,1);continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.k==="s"){p.vx*=.96;p.vy*=.96;}}}
function drawParts(){for(const p of parts){const f=1-p.t/p.life;ctx.globalAlpha=p.a*f;if(p.k==="b"){ctx.strokeStyle="rgba(200,240,255,.9)";ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.stroke();ctx.fillStyle="rgba(220,250,255,.25)";ctx.fill();}else{ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*f,0,TAU);ctx.fill();}}ctx.globalAlpha=1;}

/* ---------- decorations ---------- */
function buildDeco(){deco=[];const L=LV[G.lvl];const n=Math.ceil(W/120);
 if(L.deco==="coral")for(let i=0;i<n;i++)deco.push({x:rnd(0,W),s:rnd(.6,1.5),hue:[["#ff7a59","#ff5470"],["#ffb35c","#ff8a3d"],["#c95cff","#8a4dff"]][i%3],ph:rnd(0,TAU)});
 if(L.deco==="wreck")for(let i=0;i<Math.ceil(n/3);i++)deco.push({x:rnd(0,W),s:rnd(.7,1.4),flip:Math.random()<.5});
 if(L.deco==="kelp")for(let i=0;i<n+4;i++)deco.push({x:rnd(0,W),h:rnd(H*.3,H*.75),ph:rnd(0,TAU),c:Math.random()<.5?"#58ffc8":"#b388ff",w:rnd(4,9)});
 if(L.deco==="ice")for(let i=0;i<n;i++)deco.push({x:rnd(0,W),s:rnd(.5,1.4),top:Math.random()<.5});
 if(L.deco==="ruins")for(let i=0;i<Math.ceil(n/2);i++)deco.push({x:rnd(0,W),s:rnd(.6,1.3),broken:Math.random()<.5});
 if(L.deco==="vents")for(let i=0;i<Math.ceil(n/2);i++)deco.push({x:rnd(0,W),s:rnd(.7,1.4),ph:rnd(0,TAU)});}
function drawDeco(t){const L=LV[G.lvl];
 if(L.deco==="coral")for(const d of deco){const bx=d.x,by=H;ctx.save();ctx.translate(bx,by);ctx.scale(d.s,d.s);
   for(let b=0;b<3;b++){const a=-Math.PI/2+(b-1)*.5+Math.sin(t+d.ph)*.03;ctx.strokeStyle=d.hue[b%2];ctx.lineWidth=10-b*2;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(Math.cos(a)*30,-40,Math.cos(a)*55,-78-b*8);ctx.stroke();ctx.fillStyle=d.hue[(b+1)%2];ctx.beginPath();ctx.arc(Math.cos(a)*55,-78-b*8,6,0,TAU);ctx.fill();}
   ctx.restore();}
 if(L.deco==="wreck")for(const d of deco){ctx.save();ctx.translate(d.x,H+10);ctx.scale(d.flip?-d.s:d.s,d.s);ctx.fillStyle="rgba(6,16,24,.9)";ctx.beginPath();ctx.moveTo(-90,0);ctx.quadraticCurveTo(-70,-55,0,-60);ctx.lineTo(70,-52);ctx.quadraticCurveTo(95,-30,100,0);ctx.closePath();ctx.fill();ctx.fillRect(-8,-115,8,58);ctx.fillStyle="rgba(10,26,38,.9)";ctx.beginPath();ctx.moveTo(-4,-115);ctx.lineTo(-44,-78);ctx.lineTo(-4,-72);ctx.closePath();ctx.fill();ctx.fillStyle="rgba(120,220,255,.12)";for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-45+i*32,-30,6,0,TAU);ctx.fill();}ctx.restore();}
 if(L.deco==="kelp")for(const d of deco){ctx.strokeStyle=d.c;ctx.globalAlpha=.5;ctx.lineWidth=d.w;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(d.x,H);for(let s=1;s<=6;s++){const yy=H-(d.h/6)*s;ctx.lineTo(d.x+Math.sin(t*1.2+d.ph+s*.8)*14*(s/6+.3),yy);}ctx.stroke();ctx.globalAlpha=.9;ctx.fillStyle=d.c;ctx.beginPath();ctx.arc(d.x+Math.sin(t*1.2+d.ph+4.8)*16,H-d.h,d.w*.8,0,TAU);ctx.fill();ctx.globalAlpha=1;}
 if(L.deco==="ice")for(const d of deco){ctx.save();ctx.translate(d.x,d.top?0:H);ctx.scale(d.s,d.top?d.s:-d.s);const g=ctx.createLinearGradient(0,0,0,90);g.addColorStop(0,"rgba(200,240,255,.85)");g.addColorStop(1,"rgba(120,190,230,.15)");ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(0,95);ctx.lineTo(22,0);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(30,55);ctx.lineTo(44,0);ctx.closePath();ctx.fill();ctx.restore();}
 if(L.deco==="ruins")for(const d of deco){ctx.save();ctx.translate(d.x,H);ctx.scale(d.s,d.s);const hh=d.broken?-90:-150;ctx.fillStyle="rgba(38,28,70,.95)";ctx.fillRect(-16,hh,32,-hh);ctx.fillStyle="rgba(60,46,110,.95)";ctx.fillRect(-24,hh,48,12);ctx.fillRect(-24,-14,48,14);ctx.strokeStyle="rgba(255,213,107,.25)";ctx.lineWidth=2;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-8+i*8,hh+12);ctx.lineTo(-8+i*8,-16);ctx.stroke();}ctx.restore();}

function hurt(n,sx,sy){G.o2-=n;P.inv=1.1;G.shake=.3;spark(sx??P.x,sy??P.y,"rgba(255,120,100,.9)",10);sHit();hud();
 const dx=P.x-(sx??P.x),dy=P.y-(sy??P.y),m=Math.hypot(dx,dy)||1;P.vx+=dx/m*240;P.vy+=dy/m*240;
 if(G.o2<=0){G.o2=0;hud();gameOver();}}

/* ---------- player update ---------- */
function updPlayer(dt){let ix=0,iy=0;
 if(keys.ArrowLeft||keys.KeyA)ix-=1;if(keys.ArrowRight||keys.KeyD)ix+=1;
 if(keys.ArrowUp||keys.KeyW)iy-=1;if(keys.ArrowDown||keys.KeyS)iy+=1;
 ix+=joy.dx;iy+=joy.dy;const m=Math.hypot(ix,iy);if(m>1){ix/=m;iy/=m;}
 const AC2=820;P.vx+=ix*AC2*dt;P.vy+=iy*AC2*dt;P.vx*=Math.pow(.05,dt);P.vy*=Math.pow(.05,dt);
 P.x+=P.vx*dt;P.y+=P.vy*dt;P.x=clamp(P.x,26,W-26);P.y=clamp(P.y,60,H-30);
 if(Math.abs(ix)>.15)P.face=ix>0?1:-1;
 P.tilt+=((P.vy*.0012)-P.tilt)*dt*8;P.tilt=clamp(P.tilt,-.4,.4);
 const sp=Math.hypot(P.vx,P.vy);P.kick+=dt*(4+sp*.03);P.inv=Math.max(0,P.inv-dt);P.fireCd=Math.max(0,P.fireCd-dt);
 if(fireHeld&&(G.state==="boss"))fire();
 if(G.state==="explore"){G.o2-=dt*1.1;if(G.o2<=0){G.o2=0;gameOver();return;}if(Math.floor(G.t)!==Math.floor(G.t-dt))hud();
  for(let i=pearls.length-1;i>=0;i--){if(dist2(pearls[i].x,pearls[i].y,P.x,P.y)<30*30){spark(pearls[i].x,pearls[i].y,"rgba(190,250,255,.95)",12);pearls.splice(i,1);G.pearls++;G.o2=Math.min(G.maxO2,G.o2+8);sPick();hud();
   if(G.pearls>=G.pearlsNeed){gate={x:W*.84,y:H*.4};toast("✦ The puzzle gate has opened — swim into the ring!");}else toast("Pearl "+G.pearls+" / "+G.pearlsNeed,1200);}}
  if(gate&&dist2(gate.x,gate.y,P.x,P.y)<46*46){openPuzzle();}}}

function startLevel(i,fresh){G.lvl=i;if(fresh){G.o2=100;G.maxO2=100;G.frags=[false,false,false,false,false];}
 hide();G.state="explore";lvlNameEl.textContent=LV[i].name;buildDeco();spawnFoes();spawnPearls();bullets=[];eb=[];parts=[];boss=null;bossBar.style.display="none";
 P.x=W*.18;P.y=H*.5;P.vx=0;P.vy=0;P.inv=2;hud();showTouchUI(isTouch);
 toast(LV[i].name+"<br><span style='font-size:13px;letter-spacing:1px'>Collect "+G.pearlsNeed+" pearls to open the puzzle gate</span>",3000);}
function openPuzzle(){G.state="puzzle";gate=null;showTouchUI(false);const pz=LV[G.lvl].puzzle;
 let inner=`<h2>🧩 ${pz.title}</h2><div class="riddle">${pz.text}</div><div id="pmsg" class="msg"></div>`;
 if(pz.type==="choice"){inner+=pz.opts.map((o,i)=>`<button class="btn" data-i="${i}">${o}</button>`).join("");}
 else if(pz.type==="bells"){inner+=`<div>${[1,2,3,4,5].map(b=>`<button class="bell" data-b="${b}">${b}</button>`).join("")}</div><button class="btn gold" id="ring">🔔 Ring the chosen bells</button>`;}
 else{inner+=`<input class="tin" id="ans" type="text" placeholder="Type your answer…" autocomplete="off"><br><button class="btn gold" id="sub">Answer</button>`;}
 show(inner);const msg=()=>document.getElementById('pmsg');
 const wrong=t=>{G.o2-=15;hud();sBad();if(G.o2<=0){G.o2=0;gameOver();return true;}msg().className="msg bad";msg().textContent=t+" (−15 oxygen)";return false;};
 const right=()=>{sGood();msg().className="msg good";msg().textContent=pz.why;setTimeout(()=>{hide();G.state="boss";startBoss();},1700);};
 if(pz.type==="choice")ov.querySelectorAll('.btn').forEach(b=>b.onclick=()=>{+b.dataset.i===pz.ans?right():wrong("The trap springs!");});
 if(pz.type==="bells"){const sel=new Set();ov.querySelectorAll('.bell').forEach(b=>b.onclick=()=>{const v=+b.dataset.b;sel.has(v)?(sel.delete(v),b.classList.remove('sel')):(sel.add(v),b.classList.add('sel'));snd(300+v*80,.15,'sine',.05);});
  document.getElementById('ring').onclick=()=>{const a=[...sel].sort().join(",");a==="2,3,5"?right():wrong("The wrong toll echoes — sharks stir!");};}
 if(pz.type==="text"){const go=()=>{const v=document.getElementById('ans').value.trim().toLowerCase();(v.includes(pz.ans)&&v.length<=pz.ans.length+4)?right():wrong("The stone dims. Not quite.");};
  document.getElementById('sub').onclick=go;document.getElementById('ans').addEventListener('keydown',e=>{if(e.key==="Enter")go();});}}
function showReward(){G.state="reward";showTouchUI(false);const R=LV[G.lvl].reward;if(R.frag>=0)G.frags[R.frag]=true;R.fx();hud();
 show(`<div class="gem">🏆</div><h2>${LV[G.lvl].boss.name} defeated!</h2><p><b style="color:#ffd987">Reward:</b> ${R.text}</p>
 <button class="btn gold" id="next">⬇ &nbsp;Descend to ${LV[G.lvl+1].name.split("·")[1].trim()}</button>`);
 document.getElementById('next').onclick=()=>startLevel(G.lvl+1,false);}
function gameOver(){if(G.state==="dead")return;G.state="dead";showTouchUI(false);sBoom();
 show(`<div class="gem">💀</div><h2>Out of Oxygen</h2><p>The abyss claims another explorer. The Heart of the Ocean stays hidden…</p>
 <button class="btn" id="retry">↻ &nbsp;Retry this level</button> <button class="btn" id="restart">⟲ &nbsp;Restart journey</button>`);
 document.getElementById('retry').onclick=()=>{G.o2=Math.max(60,G.maxO2*.6);startLevel(G.lvl,false);};
 document.getElementById('restart').onclick=()=>title();}
function victory(){G.state="win";showTouchUI(false);G.frags=[true,true,true,true,true];hud();
 show(`<div class="gem">💎</div><h1>The Heart of the Ocean</h1>
 <p>Morgath the Deep dissolves into the current. Kai raises the gem — the tides settle, the storms calm, and balance returns to the seas.</p>
 <p class="small">All map fragments recovered · Every guardian defeated</p>
 <button class="btn gold" id="again">⟲ &nbsp;Play Again</button>`);
 document.getElementById('again').onclick=()=>title();}

/* ---------- main loop ---------- */
let last=performance.now();
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;G.t+=dt;
 ctx.save();if(G.shake>0){G.shake-=dt;ctx.translate(rnd(-1,1)*G.shake*14,rnd(-1,1)*G.shake*14);}
 drawBG(G.t);
 if(G.state==="explore"||G.state==="boss"){
  updPlayer(dt);if(G.state==="explore"){updFoes(dt);}else{updBoss(dt);}updBullets(dt);updParts(dt);
  for(const p of pearls)drawPearl(p,G.t);drawGate(G.t);
  for(const e of enemies)drawFoe(e,G.t);
  if(boss)drawBoss(G.t);
  drawBullets();drawDiver(G.t);drawParts();darkness();}
 else{updParts(dt);drawParts();if(G.state!=="title"&&G.state!=="dead"&&G.state!=="win"&&G.state!=="reward"){drawDiver(G.t);}}
 ctx.restore();requestAnimationFrame(loop);}
P.x=W*.2;P.y=H*.5;hud();title();requestAnimationFrame(loop);
</script>
</body>
