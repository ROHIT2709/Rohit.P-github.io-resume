<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Abyssal Treasure Hunt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#020c14;font-family:'Trebuchet MS',system-ui,sans-serif;touch-action:none;overscroll-behavior:none;position:fixed}
canvas{display:block;position:absolute;inset:0}
#hud{position:absolute;top:0;left:0;right:0;padding:max(10px,env(safe-area-inset-top)) 14px 0;display:flex;align-items:flex-start;gap:10px;pointer-events:none;z-index:5}
#o2wrap{flex:1;max-width:260px}
#o2lab{font-size:10px;letter-spacing:2px;color:#9fd9ef;text-transform:uppercase;margin-bottom:3px;text-shadow:0 1px 3px #000}
#o2bg{height:10px;background:rgba(3,20,33,.7);border:1px solid rgba(130,220,255,.35);border-radius:6px;overflow:hidden}
#o2f{height:100%;width:100%;background:linear-gradient(90deg,#27c2ff,#6df0d8);border-radius:6px;transition:width .2s}
#depth{font-size:10px;letter-spacing:1px;color:#7fb8cc;margin-top:3px;text-shadow:0 1px 3px #000}
#frags{display:flex;gap:4px;align-items:center;margin-top:1px}
.fr{width:20px;height:20px;border-radius:5px;border:1px solid rgba(150,225,255,.3);background:rgba(3,20,33,.6);display:flex;align-items:center;justify-content:center;font-size:11px;filter:grayscale(1) opacity(.4)}
.fr.on{filter:none;background:rgba(20,70,60,.7);box-shadow:0 0 8px rgba(110,240,200,.5)}
#lvlname{position:absolute;top:max(58px,calc(env(safe-area-inset-top) + 50px));left:14px;font-size:11px;color:#7fc6de;letter-spacing:2px;text-transform:uppercase;text-shadow:0 1px 3px #000;pointer-events:none;z-index:5}
#bossbar{position:absolute;bottom:max(118px,calc(env(safe-area-inset-bottom) + 104px));left:50%;transform:translateX(-50%);width:min(72%,430px);display:none;z-index:5;pointer-events:none}
#bosslab{text-align:center;font-size:11px;letter-spacing:2px;color:#ffb1a3;text-transform:uppercase;margin-bottom:3px;text-shadow:0 1px 4px #000}
#bossbg{height:9px;background:rgba(30,5,8,.75);border:1px solid rgba(255,120,110,.4);border-radius:5px;overflow:hidden}
#bossf{height:100%;width:100%;background:linear-gradient(90deg,#ff5c4d,#ffb13d);border-radius:5px;transition:width .15s}
#bosshint{text-align:center;font-size:11px;letter-spacing:1px;color:#cfe6f0;margin-top:4px;text-shadow:0 1px 3px #000;min-height:14px}
#toast{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);font-size:clamp(14px,3.4vw,21px);color:#dff6ff;letter-spacing:2px;text-align:center;text-shadow:0 0 14px rgba(90,210,255,.8),0 2px 4px #000;opacity:0;transition:opacity .4s;pointer-events:none;z-index:6;padding:0 20px}
#joy{position:absolute;left:18px;bottom:max(18px,env(safe-area-inset-bottom));width:118px;height:118px;border-radius:50%;border:2px solid rgba(140,225,255,.28);background:rgba(8,30,48,.3);z-index:8;display:none}
#knob{position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(170,235,255,.85),rgba(40,140,190,.8));transform:translate(-50%,-50%);box-shadow:0 0 12px rgba(80,200,255,.45)}
#fire{position:absolute;right:20px;bottom:max(26px,calc(env(safe-area-inset-bottom) + 8px));width:84px;height:84px;border-radius:50%;border:2px solid rgba(255,170,120,.45);background:radial-gradient(circle at 35% 30%,rgba(255,140,90,.45),rgba(140,40,20,.5));color:#ffe3d0;font-size:13px;letter-spacing:1px;z-index:8;display:none;align-items:center;justify-content:center;font-weight:700;text-shadow:0 1px 3px #000}
#fire:active{transform:scale(.93)}
#fs{position:absolute;top:max(8px,env(safe-area-inset-top));right:10px;z-index:20;width:42px;height:42px;border-radius:10px;border:1px solid rgba(140,225,255,.4);background:rgba(8,30,48,.55);color:#cfeeff;font-size:19px;display:flex;align-items:center;justify-content:center}
#fs:active{transform:scale(.92)}
#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(1,8,14,.55);backdrop-filter:blur(3px);z-index:10;padding:16px}
.panel{width:min(440px,94vw);max-height:86vh;overflow-y:auto;background:linear-gradient(180deg,rgba(6,28,44,.96),rgba(3,14,24,.97));border:1px solid rgba(120,215,255,.3);border-radius:18px;padding:22px 22px 20px;color:#cfeaf5;box-shadow:0 0 40px rgba(30,150,210,.25);text-align:center}
.panel h1{font-size:clamp(20px,5.5vw,27px);letter-spacing:3px;color:#eafaff;text-transform:uppercase;text-shadow:0 0 16px rgba(90,210,255,.7);margin-bottom:4px;font-weight:700}
.panel h2{font-size:clamp(15px,4.4vw,19px);letter-spacing:2px;color:#bfeeff;margin-bottom:8px}
.panel p{font-size:14px;line-height:1.65;color:#a8cddd;margin:8px 0}
.panel .gem{font-size:38px;margin-bottom:4px;filter:drop-shadow(0 0 12px rgba(110,240,210,.8))}
.riddle{font-style:italic;background:rgba(10,45,68,.5);border:1px solid rgba(120,215,255,.2);border-radius:12px;padding:12px;color:#d6f1fb;font-size:14px;line-height:1.7;margin:10px 0}
.btn{display:inline-block;min-height:48px;padding:12px 22px;margin:6px 4px;border-radius:12px;border:1px solid rgba(140,230,255,.45);background:linear-gradient(180deg,rgba(30,110,160,.6),rgba(12,55,85,.7));color:#eafaff;font-size:15px;letter-spacing:1px;cursor:pointer;font-family:inherit;font-weight:700}
.btn:active{transform:scale(.96)}
.btn.gold{border-color:rgba(255,210,120,.5);background:linear-gradient(180deg,rgba(180,120,30,.55),rgba(110,65,10,.65));color:#ffeecf}
.bell{width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,210,120,.4);background:rgba(60,40,10,.5);color:#ffe9bd;font-size:17px;margin:5px;cursor:pointer;font-weight:700;font-family:inherit}
.bell.sel{background:linear-gradient(180deg,rgba(255,190,80,.75),rgba(170,100,20,.8));box-shadow:0 0 14px rgba(255,200,100,.7);color:#3a2300}
.tin{width:100%;min-height:48px;border-radius:12px;border:1px solid rgba(140,230,255,.4);background:rgba(5,25,40,.8);color:#eafaff;font-size:16px;padding:10px 14px;text-align:center;letter-spacing:1px;margin:8px 0;font-family:inherit}
.tin:focus{outline:none;border-color:rgba(140,230,255,.8)}
.msg{min-height:20px;font-size:13px;margin-top:6px}
.msg.bad{color:#ff9e92}.msg.good{color:#8df0cf}
.small{font-size:12px;color:#6fa6ba}
#ctrlhint{font-size:12px;color:#7fb8cc;margin-top:10px;line-height:1.6}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="o2wrap"><div id="o2lab">Oxygen</div><div id="o2bg"><div id="o2f"></div></div><div id="depth">0 m</div></div>
  <div id="frags">
    <div class="fr" id="f0">🗺️</div><div class="fr" id="f1">🗺️</div><div class="fr" id="f2">🗺️</div><div class="fr" id="f3">🧭</div><div class="fr" id="f4">🗺️</div>
  </div>
</div>
<div id="lvlname"></div>
<button id="fs" title="Fullscreen">⛶</button>
<div id="bossbar"><div id="bosslab"></div><div id="bossbg"><div id="bossf"></div></div><div id="bosshint"></div></div>
<div id="toast"></div>
<div id="joy"><div id="knob"></div></div>
<button id="fire">FIRE</button>
<div id="ov"></div>
<script>
"use strict";
const TAU=Math.PI*2;
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy};
const lerp=(a,b,t)=>a+(b-a)*t;
function lerpA(a,b,t){let d=((b-a)%TAU+TAU*1.5)%TAU-Math.PI;return a+d*t;}
function segD2(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay;const l2=dx*dx+dy*dy||1;let t=((px-ax)*dx+(py-ay)*dy)/l2;t=clamp(t,0,1);return dist2(px,py,ax+dx*t,ay+dy*t);}
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function vpW(){return Math.max(document.documentElement.clientWidth||0,window.innerWidth||0,320)}
function vpH(){return Math.max(document.documentElement.clientHeight||0,window.innerHeight||0,(window.visualViewport?window.visualViewport.height:0)||0,320)}
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=vpW();H=vpH();cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
resize();
const WW=2600,WH=1500; // world size
const cam={x:0,y:0,shake:0};

/* ---------- audio ---------- */
let AC=null;
function snd(f,d,type,vol){try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.setValueAtTime(vol||.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sFire=()=>snd(540,.12,'square',.045),sHit=()=>snd(110,.25,'sawtooth',.09),sPick=()=>snd(880,.18,'sine',.07),
sGood=()=>{snd(660,.15,'sine',.07);setTimeout(()=>snd(990,.25,'sine',.07),120)},sBad=()=>snd(140,.4,'sawtooth',.08),
sBoom=()=>snd(70,.6,'sawtooth',.12),sRumble=()=>snd(46,.8,'sawtooth',.1),sClank=()=>snd(950,.06,'square',.04),
sCrit=()=>{snd(320,.12,'triangle',.09);setTimeout(()=>snd(480,.14,'triangle',.08),70)},sThump=()=>snd(58,.16,'sine',.12);

/* ---------- input ---------- */
const keys={};let fireHeld=false;
window.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')fireHeld=true;if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='Space')fireHeld=false;});
const joyEl=document.getElementById('joy'),knob=document.getElementById('knob'),fireBtn=document.getElementById('fire');
const joy={on:false,id:null,dx:0,dy:0,mag:0};
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
function showTouchUI(s){joyEl.style.display=s?'block':'none';fireBtn.style.display=s?'flex':'none';}
function joyCenter(){const r=joyEl.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function setKnob(dx,dy){knob.style.transform=`translate(calc(-50% + ${dx*36}px),calc(-50% + ${dy*36}px))`;}
function joySet(t){const c=joyCenter();let dx=(t.clientX-c.x)/46,dy=(t.clientY-c.y)/46;const m=Math.hypot(dx,dy);joy.mag=Math.min(m,1);if(m>1){dx/=m;dy/=m;}joy.dx=dx;joy.dy=dy;setKnob(dx,dy);}
window.addEventListener('touchstart',e=>{for(const t of e.changedTouches){if(t.clientX<W*.5&&t.clientY>H*.32&&!joy.on){joy.on=true;joy.id=t.identifier;joySet(t);}}},{passive:true});
window.addEventListener('touchmove',e=>{for(const t of e.changedTouches){if(joy.on&&t.identifier===joy.id)joySet(t);}e.preventDefault();},{passive:false});
window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(joy.on&&t.identifier===joy.id){joy.on=false;joy.dx=0;joy.dy=0;joy.mag=0;setKnob(0,0);}}},{passive:true});
fireBtn.addEventListener('touchstart',e=>{fireHeld=true;e.stopPropagation();},{passive:true});
fireBtn.addEventListener('touchend',e=>{fireHeld=false;e.stopPropagation();},{passive:true});
fireBtn.addEventListener('mousedown',()=>fireHeld=true);
fireBtn.addEventListener('mouseup',()=>fireHeld=false);

/* ---------- levels ---------- */
const LV=[
{name:"Level 1 · Coral Kingdom",depth:18,top:"#2f9fc9",mid:"#147099",bot:"#063550",haze:"rgba(40,130,170,",deco:"coral",rays:true,dark:0,
 foes:[["needle",8],["eel",3],["stone",3]],
 puzzle:{type:"choice",title:"The Three Coral Gates",text:'Gate A: “The treasure is behind Gate B.”<br>Gate B: “This gate is safe.”<br>Gate C: “Both other signs are false.”<br><br>Only ONE sign is true. Which gate do you open?',opts:["Gate A","Gate B","Gate C"],ans:2,why:"Only Gate C can be the lone truth — so A lies (nothing behind B) and B lies (B is a trap). Gate C opens."},
 boss:{id:"crab",name:"King Clawfin",hp:120,intro:"His shell turns torpedoes. Bait his charge — strike the belly when he stuns himself."},
 reward:{frag:0,text:"Map Fragment #1 + Oxygen Tank Upgrade (max oxygen +25)",fx:()=>{G.maxO2+=25;G.o2=G.maxO2;}}},
{name:"Level 2 · The Sunken Fleet",depth:120,top:"#1b425c",mid:"#0d2638",bot:"#040b13",haze:"rgba(20,60,90,",deco:"wreck",rays:false,dark:.2,
 foes:[["jelly",6],["skel",5],["pira",4]],
 puzzle:{type:"bells",title:"The Five Ship Bells",text:"Ring only the bells whose positions are <b>prime numbers</b>.<br>The wrong toll wakes the bone sharks.",ans:[2,3,5],why:"2, 3 and 5 are prime. The fleet stays silent."},
 boss:{id:"shark",name:"The Iron Jaw Shark",hp:140,intro:"It circles in the murk. Watch the wake — dodge the charge, then hit the glowing gills as it turns."},
 reward:{frag:1,text:"Map Fragment #2 + Sonar Scanner (+20 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+20);}}},
{name:"Level 3 · Abyssal Forest",depth:430,top:"#0a4540",mid:"#053230",bot:"#01100e",haze:"rgba(10,70,60,",deco:"kelp",rays:false,dark:.5,
 foes:[["squid",4],["eye",4],["lant",3]],
 puzzle:{type:"text",title:"The Glowing Stone",text:"“I speak without a mouth.<br>I hear without ears.<br>I disappear when you talk.<br><br>What am I?”",ans:"echo",why:"An echo. The hidden cave grinds open."},
 boss:{id:"kraken",name:"The Kraken Spawn",hp:170,intro:"Its tentacles sweep where the shadows point. Survive the combo — strike the eye when it opens."},
 reward:{frag:2,text:"Map Fragment #3 + Stealth Module (+20 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+20);}}},
{name:"Level 4 · The Frozen Trench",depth:900,top:"#2c6b8a",mid:"#12435e",bot:"#081f2e",haze:"rgba(90,170,210,",deco:"ice",rays:false,dark:.15,
 foes:[["serp",3],["pira",6],["ray",3]],
 puzzle:{type:"choice",title:"The Three Levers",text:'Levers in order: <b>Blue · Red · Green</b>.<br>“Pull the lever that is neither first nor last.”<br>A wrong pull floods the chamber.',opts:["Blue","Red","Green"],ans:1,why:"Neither first nor last — the middle lever. Red."},
 boss:{id:"levi",name:"Leviathan of Ice",hp:200,intro:"It breaches like a freight train and rains icicles. Every third charge it slams the ice — that's your window."},
 reward:{frag:3,text:"The Ancient Compass (+20 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+20);}}},
{name:"Level 5 · City of Lost Tides",depth:2100,top:"#3d2c68",mid:"#1f1440",bot:"#0c081f",haze:"rgba(80,60,150,",deco:"ruins",rays:false,dark:.3,
 foes:[["phan",4],["hydra",3],["guard",3]],
 puzzle:{type:"choice",title:"The Statue's Two Chests",text:'Gold chest: “The treasure is not here.”<br>Silver chest: “The treasure is in the gold chest.”<br><br>Exactly one sign lies. Which chest do you open?',opts:["Gold Chest","Silver Chest"],ans:0,why:"If silver tells the truth, gold's sign is the single lie — the treasure sits in the gold chest."},
 boss:{id:"twins",name:"The Twin Sea Dragons",hp:230,intro:"They strike in turns from opposite sides. When both dive at once, slip aside — make them collide."},
 reward:{frag:4,text:"The Final Map Fragment — the map is complete! (+25 oxygen)",fx:()=>{G.o2=Math.min(G.maxO2,G.o2+25);}}},
{name:"Final · The Abyss of Eternity",depth:10900,top:"#0b0d18",mid:"#04050c",bot:"#000002",haze:"rgba(20,20,40,",deco:"vents",rays:false,dark:.75,
 foes:[["angler",4],["nsquid",4],["whale",2]],
 puzzle:{type:"text",title:"The Ancient Door",text:"“The more you take,<br>the more you leave behind.<br><br>What am I?”",ans:"footsteps",why:"Footsteps. The door opens onto the treasure chamber — and Morgath is waiting."},
 boss:{id:"morgath",name:"Morgath the Deep",hp:300,intro:"He exhausts himself after every spell. Survive the barrage, the whirlpool, the shadow-step — then make him pay."},
 reward:{frag:-1,text:"",fx:()=>{}}}
];

/* ---------- state ---------- */
const G={state:"title",lvl:0,o2:100,maxO2:100,frags:[false,false,false,false,false],pearls:0,pearlsNeed:3,t:0,cine:0,beat:0};
const P={x:300,y:700,vx:0,vy:0,ang:0,flip:1,kick:0,inv:0,fireCd:0,breath:0,sprint:false};
let enemies=[],pearls=[],bullets=[],hz=[],parts=[],deco=[],far=[],schools=[],boss=null,gate=null;
const $=id=>document.getElementById(id);
const hudO2=$('o2f'),depthEl=$('depth'),lvlNameEl=$('lvlname'),bossBarEl=$('bossbar'),bossF=$('bossf'),bossLab=$('bosslab'),bossHint=$('bosshint'),toastEl=$('toast'),ov=$('ov');
function hud(){hudO2.style.width=clamp(G.o2/G.maxO2*100,0,100)+"%";hudO2.style.background=G.o2<G.maxO2*.3?"linear-gradient(90deg,#ff6a5a,#ffb13d)":"linear-gradient(90deg,#27c2ff,#6df0d8)";for(let i=0;i<5;i++)$('f'+i).className='fr'+(G.frags[i]?' on':'');}
let toastT=null;
function toast(t,ms){toastEl.innerHTML=t;toastEl.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>toastEl.style.opacity=0,ms||2200);}
function hint(t){bossHint.textContent=t;}

/* ---------- responsive + fullscreen ---------- */
function fitWorld(){resize();}
window.addEventListener('resize',fitWorld);
window.addEventListener('orientationchange',()=>{setTimeout(fitWorld,250);setTimeout(fitWorld,700);});
if(window.visualViewport)window.visualViewport.addEventListener('resize',fitWorld);
const fsBtn=$('fs');
function goFS(){const el=document.documentElement;try{const r=(el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen);if(r){const p=r.call(el);if(p&&p.catch)p.catch(()=>{});}}catch(e){}setTimeout(fitWorld,350);}
fsBtn.addEventListener('click',goFS);
if(!(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||document.documentElement.msRequestFullscreen))fsBtn.style.display='none';
document.addEventListener('fullscreenchange',()=>setTimeout(fitWorld,250));

/* ---------- particles ---------- */
function bubble(x,y,s,vy){if(parts.length>170)return;parts.push({k:"b",x,y,r:s||rnd(1.5,4),vy:vy||rnd(-44,-20),vx:rnd(-6,6),a:rnd(.22,.5),t:0,life:rnd(1.5,3)});}
function spark(x,y,col,n,sp){for(let i=0;i<(n||8);i++){if(parts.length>220)break;const a=rnd(0,TAU),s=rnd(30,sp||140);parts.push({k:"s",x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(1.5,3.5),col,t:0,life:rnd(.3,.7),a:1});}}
function snow(){if(parts.length>200)return;parts.push({k:"m",x:cam.x+rnd(-50,W+50),y:cam.y+rnd(-50,H+50),vx:rnd(-4,4),vy:rnd(3,10),r:rnd(.7,1.8),a:rnd(.12,.32),t:0,life:rnd(4,8)});}
function updParts(dt){for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.t+=dt;if(p.t>p.life){parts.splice(i,1);continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.k==="s"){p.vx*=.96;p.vy*=.96;}}}
function drawParts(){for(const p of parts){const f=1-p.t/p.life;ctx.globalAlpha=p.a*f;
 if(p.k==="b"){ctx.strokeStyle="rgba(200,240,255,.9)";ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.stroke();ctx.fillStyle="rgba(220,250,255,.22)";ctx.fill();}
 else if(p.k==="m"){ctx.fillStyle="rgba(210,235,250,.9)";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();}
 else{ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*f,0,TAU);ctx.fill();}}ctx.globalAlpha=1;}

/* ---------- environment ---------- */
function buildDeco(){deco=[];far=[];schools=[];const L=LV[G.lvl];
 for(let x=0;x<WW;x+=rnd(180,320))far.push({x,h:rnd(120,360),w:rnd(220,420)});
 const n=Math.ceil(WW/130);
 if(L.deco==="coral")for(let i=0;i<n;i++)deco.push({k:"coral",x:rnd(0,WW),s:rnd(.7,1.7),hue:[["#ff7a59","#ff5470"],["#ffb35c","#ff8a3d"],["#c95cff","#8a4dff"]][i%3],ph:rnd(0,TAU)});
 if(L.deco==="wreck"){for(let i=0;i<7;i++)deco.push({k:"wreck",x:rnd(100,WW-100),s:rnd(.8,1.6),flip:Math.random()<.5});for(let i=0;i<n/2;i++)deco.push({k:"plank",x:rnd(0,WW),s:rnd(.5,1)});}

/* ---------- player ---------- */
function updPlayer(dt){let ix=0,iy=0;
 if(keys.ArrowLeft||keys.KeyA)ix-=1;if(keys.ArrowRight||keys.KeyD)ix+=1;
 if(keys.ArrowUp||keys.KeyW)iy-=1;if(keys.ArrowDown||keys.KeyS)iy+=1;
 let kmag=Math.hypot(ix,iy);if(kmag>1){ix/=kmag;iy/=kmag;kmag=1;}
 ix+=joy.dx;iy+=joy.dy;const m=Math.hypot(ix,iy);if(m>1){ix/=m;iy/=m;}
 P.sprint=(keys.ShiftLeft||keys.ShiftRight||joy.mag>.92)&&m>.2;
 const AC2=P.sprint?1150:780;
 P.vx+=ix*AC2*dt;P.vy+=iy*AC2*dt;
 P.vy+=14*dt; // gentle buoyancy sink
 const drag=Math.pow(.06,dt);P.vx*=drag;P.vy*=drag;
 P.x+=P.vx*dt;P.y+=P.vy*dt;P.x=clamp(P.x,30,WW-30);P.y=clamp(P.y,40,WH-26);
 const sp=Math.hypot(P.vx,P.vy);
 if(sp>22){const ta=Math.atan2(P.vy,P.vx);P.ang=lerpA(P.ang,ta,clamp(dt*6,0,1));}
 P.flip=Math.cos(P.ang)<0?-1:1;
 P.kick+=dt*(3.4+sp*.028);P.inv=Math.max(0,P.inv-dt);P.fireCd=Math.max(0,P.fireCd-dt);
 if(fireHeld&&G.state==="boss")fire();
 const drain=(P.sprint?2.3:1.0)*dt;
 G.o2-=drain;if(G.o2<=0){G.o2=0;hud();gameOver();return;}
 if((G.t|0)!==((G.t-dt)|0)){hud();depthEl.textContent=Math.round(LV[G.lvl].depth+P.y*.12)+" m";}
 if(G.state==="explore"){
  for(let i=pearls.length-1;i>=0;i--){if(dist2(pearls[i].x,pearls[i].y,P.x,P.y)<32*32){spark(pearls[i].x,pearls[i].y,"rgba(190,250,255,.95)",12);pearls.splice(i,1);G.pearls++;G.o2=Math.min(G.maxO2,G.o2+10);sPick();hud();
   if(G.pearls>=G.pearlsNeed){gate={x:WW*.9,y:WH*.35};toast("✦ The puzzle gate has opened — follow the green arrow");}else toast("Pearl "+G.pearls+" / "+G.pearlsNeed,1200);}}
  if(gate&&dist2(gate.x,gate.y,P.x,P.y)<50*50)openPuzzle();}}

 let a=P.ang;
 if(boss){const ba=Math.atan2(boss.y-P.y,boss.x-P.x);let d=((ba-a)%TAU+TAU*1.5)%TAU-Math.PI;if(Math.abs(d)<.5)a=ba;}

function updBullets(dt){for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.t+=dt;b.x+=b.vx*dt;b.y+=b.vy*dt;
 if(Math.random()<.5)bubble(b.x-b.vx*.02,b.y-b.vy*.02,1.6,-10);

  else{boss.hp-=2;spark(b.x,b.y,"rgba(180,200,215,.8)",5,80);sClank();if(!boss.armT||G.t-boss.armT>2.4){boss.armT=G.t;hint(boss.armMsg||"Armored — wait for an opening!");}}

 for(let i=hz.length-1;i>=0;i--){const h=hz[i];h.t+=dt;h.vy+=(h.grav||0)*dt;
  if(h.home){const dx=P.x-h.x,dy=P.y-h.y,m=Math.hypot(dx,dy)||1;h.vx+=dx/m*130*dt;h.vy+=dy/m*130*dt;const s=Math.hypot(h.vx,h.vy);if(s>h.max){h.vx*=h.max/s;h.vy*=h.max/s;}}

 // camera
 const tx=clamp(P.x-W/2,0,Math.max(0,WW-W)),ty=clamp(P.y-H/2,0,Math.max(0,WH-H));
 cam.x=lerp(cam.x,tx,clamp(dt*4,0,1));cam.y=lerp(cam.y,ty,clamp(dt*4,0,1));
 cam.shake=Math.max(0,cam.shake-dt);
 ctx.save();
 if(cam.shake>0)ctx.translate(rnd(-1,1)*cam.shake*14,rnd(-1,1)*cam.shake*14);
 ctx.translate(-cam.x,-cam.y);
 drawBG();drawFar();drawCaustics(G.t);
 const live=(G.state==="explore"||G.state==="boss");
 if(live){updPlayer(dt);if(G.state==="explore")updFoes(dt);else updBoss(dt);updBullets(dt);updSchools(dt);}
 updParts(dt);if(Math.random()<.5)snow();
 drawSchools(G.t);drawDeco(G.t);
 for(const p of pearls)drawPearl(p,G.t);drawGate(G.t);
 if(G.state==="explore")for(const e of enemies)drawFoe(e,G.t);
 if(boss)drawBoss(G.t);
 drawBullets();
 if(G.state!=="title")drawDiver(G.t);
 drawGuide(G.t);drawParts();drawFog();darkness();
 ctx.restore();
 // screen-space
 drawMinimap();
 if(G.cine>0){G.cine-=dt;const h2=Math.min(46,G.cine*60);ctx.fillStyle="rgba(0,0,0,.8)";ctx.fillRect(0,0,W,h2);ctx.fillRect(0,H-h2,W,h2);}
 if(G.o2<G.maxO2*.3&&live){G.beat-=dt;if(G.beat<=0){G.beat=.95;sThump();}
  const pul=.5+Math.sin(G.t*7)*.5;ctx.save();const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.36,W/2,H/2,Math.max(W,H)*.7);vg.addColorStop(0,"rgba(120,0,0,0)");vg.addColorStop(1,"rgba(150,10,10,"+(0.12+pul*.14)+")");ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);ctx.restore();}
 requestAnimationFrame(loop);}
hud();title();requestAnimationFrame(loop);
