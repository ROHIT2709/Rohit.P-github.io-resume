<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vaishna's Great Escape</title>
<style>
  :root{
    --ink:#0b0a12; --stone:#1c1830; --torch:#ffb347; --gold:#ffd95e;
    --rose:#ff5d8f; --mint:#7af0c0; --danger:#ff4d4d; --paper:#f6ecd9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--ink);overflow:hidden;touch-action:none;
    font-family:"Courier New",ui-monospace,monospace;color:var(--paper);}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#0b0a12;image-rendering:pixelated;max-width:100vw;max-height:100vh;
    box-shadow:0 0 80px rgba(255,93,143,.12), inset 0 0 0 1px #2a2440;}
  #hud{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:none;gap:18px;
    align-items:center;font-size:14px;letter-spacing:1px;text-shadow:0 2px 0 #000;
    background:rgba(11,10,18,.65);padding:8px 16px;border:1px solid #2a2440;border-radius:10px;z-index:5;}
  #hud .hp-wrap{width:140px;height:12px;background:#2a2440;border-radius:6px;overflow:hidden;}
  #hud .hp{height:100%;width:100%;background:linear-gradient(90deg,var(--rose),var(--danger));transition:width .15s;}
  #hud .gem{color:var(--gold);}
  #msg{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);max-width:92vw;
    text-align:center;font-size:14px;letter-spacing:.5px;color:var(--gold);
    text-shadow:0 2px 0 #000;background:rgba(11,10,18,.7);padding:8px 14px;
    border:1px solid #3a3258;border-radius:10px;display:none;z-index:5;}
  /* touch controls */
  .stick{position:fixed;bottom:24px;width:120px;height:120px;border-radius:50%;
    border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);display:none;z-index:6;}
  .stick .nub{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;
    background:rgba(255,255,255,.22);transform:translate(-50%,-50%);}
  #stickL{left:24px;} #stickR{right:24px;border-color:rgba(255,93,143,.35);}
  @media (pointer:coarse){ .stick{display:block;} }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="960" height="600"></canvas></div>
<div id="hud">
  <span>❤️</span><div class="hp-wrap"><div class="hp" id="hpbar"></div></div>
  <span class="gem" id="gems">💎 0 / 3</span>
  <span id="score">⭐ 0</span>
</div>
<div id="msg"></div>
<div class="stick" id="stickL"><div class="nub" id="nubL"></div></div>
<div class="stick" id="stickR"><div class="nub" id="nubR"></div></div>

<script>
"use strict";
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const hud = document.getElementById('hud'), hpbar = document.getElementById('hpbar');
const gemsEl = document.getElementById('gems'), scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const W = cv.width, H = cv.height;

/* ---------- audio (tiny chiptune beeps) ---------- */
let AC = null;
function audio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq, dur=0.08, type='square', vol=0.06, slide=0){
  const a = audio(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, a.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide), a.currentTime+dur);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
const sfx = {
  shoot: ()=>beep(620,.06,'square',.04,-300),
  hit:   ()=>beep(180,.08,'sawtooth',.06,-80),
  hurt:  ()=>beep(120,.18,'sawtooth',.08,-60),
  pick:  ()=>{beep(740,.07,'square',.06); setTimeout(()=>beep(990,.1,'square',.06),70);},
  key:   ()=>{beep(523,.09,'triangle',.08); setTimeout(()=>beep(659,.09,'triangle',.08),90); setTimeout(()=>beep(784,.14,'triangle',.08),180);},
  wrong: ()=>beep(140,.15,'square',.06,-40),
  door:  ()=>beep(90,.4,'sawtooth',.09,40),
  boom:  ()=>beep(70,.35,'sawtooth',.1,-30),
  win:   ()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.09),i*140));}
};

/* ---------- input ---------- */
const keys = {};
let mouse = {x:W/2, y:H/2, down:false};
addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; if(e.key===' ') e.preventDefault(); });
addEventListener('keyup',   e=>{ keys[e.key.toLowerCase()] = false; });
function canvasPos(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) };
}
cv.addEventListener('mousemove', e=>{ const p=canvasPos(e); mouse.x=p.x; mouse.y=p.y; });
cv.addEventListener('mousedown', e=>{ mouse.down=true; audio(); handleClick(canvasPos(e)); });
addEventListener('mouseup', ()=> mouse.down=false);

/* touch joysticks */
const stickL=document.getElementById('stickL'), stickR=document.getElementById('stickR');
const nubL=document.getElementById('nubL'), nubR=document.getElementById('nubR');
let joyMove={x:0,y:0,id:null}, joyFire={x:0,y:0,id:null,active:false};
function bindStick(el,nub,joy,isFire){
  el.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.changedTouches[0]; joy.id=t.identifier; if(isFire)joy.active=true; },{passive:false});
  addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){
        const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
        let dx=t.clientX-cx, dy=t.clientY-cy; const m=Math.hypot(dx,dy)||1, cap=Math.min(m,46);
        dx=dx/m*cap; dy=dy/m*cap;
        joy.x=dx/46; joy.y=dy/46;
        nub.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }
    }
  },{passive:false});
  addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){ joy.id=null; joy.x=0; joy.y=0; if(isFire)joy.active=false;
        nub.style.transform='translate(-50%,-50%)'; }
    }
  });
}
bindStick(stickL,nubL,joyMove,false);
bindStick(stickR,nubR,joyFire,true);
cv.addEventListener('touchstart',e=>{ audio(); const t=e.changedTouches[0]; handleClick(canvasPos(t)); },{passive:true});

/* ---------- helpers ---------- */
const rnd=(a,b)=>a+Math.random()*(b-a);
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function showMsg(t, ms=3500){ msgEl.textContent=t; msgEl.style.display='block';
  clearTimeout(showMsg._t); if(ms>0) showMsg._t=setTimeout(()=>msgEl.style.display='none', ms); }

/* ---------- game state ---------- */
let state='title';      // title | cage | dungeon | boss | win | lose
let frame=0, score=0, shake=0;
const particles=[], floaters=[];

const player={ x:0,y:0,r:14,hp:100,maxhp:100,speed:3.3,cool:0,inv:0,face:0 };
let bullets=[], ebullets=[], minions=[], treasures=[], gemsGot=0;
let boss=null, doorOpen=false, bossDoor={x:0,y:0,w:90,h:24};

/* dungeon world */
const WORLD={w:1800,h:1300};
let cam={x:0,y:0};
let walls=[];

/* cage scene search spots */
let spots=[], keyFound=false, cageOpen=false;
const wrongLines=[
  "Nothing here… just ROHIT's old socks. Ew. 🧦",
  "A spider waves at you. Not the key. 🕷️",
  "Empty! ROHIT's hiding skills are annoyingly good.",
  "Just dust and a half-eaten biryani. Keep looking! 🍛",
  "A note: 'You'll never escape — ROHIT'. Watch me. 😤"
];

/* ---------- scene setup ---------- */
function setupCage(){
  state='cage'; keyFound=false; cageOpen=false;
  player.x=W/2; player.y=H/2+40; player.hp=player.maxhp;
  const objs=[
    {x:200,y:430,type:'skull'},{x:760,y:430,type:'barrel'},
    {x:170,y:250,type:'rock'},{x:790,y:250,type:'bones'},
    {x:480,y:180,type:'pot'}
  ];
  const keyIdx=Math.floor(Math.random()*objs.length);
  spots=objs.map((o,i)=>({...o, r:34, hasKey:i===keyIdx, searched:false}));
  hud.style.display='none';
  showMsg("Locked in ROHIT's cage! Tap the glowing objects to find the hidden key 🔑", 6000);
}

function setupDungeon(){
  state='dungeon'; gemsGot=0; doorOpen=false;
  bullets=[]; ebullets=[]; minions=[];
  player.x=160; player.y=WORLD.h-160;
  const T=46;
  walls=[
    // outer border
    {x:0,y:0,w:WORLD.w,h:T},{x:0,y:WORLD.h-T,w:WORLD.w,h:T},
    {x:0,y:0,w:T,h:WORLD.h},{x:WORLD.w-T,y:0,w:T,h:WORLD.h},
    // inner maze chunks
    {x:300,y:250,w:420,h:T},{x:300,y:250,w:T,h:380},
    {x:900,y:150,w:T,h:430},{x:900,y:534,w:380,h:T},
    {x:1280,y:250,w:T,h:330},{x:520,y:780,w:520,h:T},
    {x:520,y:780,w:T,h:300},{x:1240,y:830,w:360,h:T},
    {x:1480,y:300,w:T,h:380},{x:200,y:980,w:240,h:T},
    {x:680,y:1020,w:T,h:220},{x:1100,y:1040,w:300,h:T},
  ];
  // boss door at top center
  bossDoor={x:WORLD.w/2-60, y:0, w:120, h:T};
  // hidden treasures tucked in corners
  treasures=[
    {x:1650,y:160,got:false},   // top-right nook
    {x:380,y:560,got:false},    // inside L-wall pocket
    {x:1380,y:1180,got:false},  // bottom-right behind walls
  ];
  // minion spawners
  for(let i=0;i<8;i++) spawnMinion();
  hud.style.display='flex';
  updateHud();
  showMsg("Find 3 hidden gems 💎 to unlock ROHIT's door. Shoot his goons! (WASD + mouse / joysticks)", 7000);
}
function spawnMinion(){
  let x,y,tries=0;
  do{ x=rnd(120,WORLD.w-120); y=rnd(120,WORLD.h-120); tries++; }
  while((dist({x,y},player)<420 || inWall(x,y,16)) && tries<60);
  minions.push({x,y,r:15,hp:30,maxhp:30,speed:rnd(1.1,1.8),hitT:0,wob:rnd(0,9)});
}

function setupBoss(){
  state='boss'; bullets=[]; ebullets=[]; minions=[];
  walls=[{x:0,y:0,w:W,h:30},{x:0,y:H-30,w:W,h:30},{x:0,y:0,w:30,h:H},{x:W-30,y:0,w:30,h:H}];
  player.x=W/2; player.y=H-90; player.hp=Math.min(player.maxhp, player.hp+40);
  boss={x:W/2,y:140,r:42,hp:320,maxhp:320,t:0,phase:0,vx:2.2,dashT:0,angry:false};
  cam={x:0,y:0};
  updateHud();
  showMsg("⚔️ FINAL SHOWDOWN: ROHIT appears! Dodge & destroy. Vaishna, this is YOUR moment!", 6000);
}

/* ---------- collision ---------- */
function inWall(x,y,r){
  for(const w of walls){
    if(x+r>w.x && x-r<w.x+w.w && y+r>w.y && y-r<w.y+w.h){
      if(state==='dungeon' && doorOpen &&
         x>bossDoor.x-10 && x<bossDoor.x+bossDoor.w+10 && y-r<bossDoor.y+bossDoor.h+6) continue;
      return true;
    }
  }
  return false;
}
function moveCirc(o,dx,dy){
  if(!inWall(o.x+dx,o.y,o.r)) o.x+=dx;
  if(!inWall(o.x,o.y+dy,o.r)) o.y+=dy;
}

/* ---------- clicking (cage search + buttons) ---------- */
function handleClick(p){
  if(state==='title'){ setupCage(); return; }
  if(state==='win'||state==='lose'){ resetAll(); return; }
  if(state==='cage'){
    if(cageOpen){ return; }
    for(const s of spots){
      if(!s.searched && Math.hypot(p.x-s.x,p.y-s.y)<s.r+12){
        s.searched=true;
        if(s.hasKey){
          keyFound=true; sfx.key();
          burst(s.x,s.y,'#ffd95e',26);
          showMsg("🔑 KEY FOUND! Vaishna picks the lock like a pro… The cage swings open!",4500);
          setTimeout(()=>{ cageOpen=true; sfx.door(); shake=10;
            showMsg("Walk out! ➜ Entering ROHIT's dungeon…",3000);
            setTimeout(setupDungeon, 2200);
          },1400);
        }else{
          sfx.wrong();
          showMsg(wrongLines[Math.floor(Math.random()*wrongLines.length)],3000);
          burst(s.x,s.y,'#8a7f6a',10);
        }
        return;
      }
    }
  }
}

/* ---------- shooting ---------- */
function tryShoot(){
  if(player.cool>0) return;
  let ax,ay;
  if(joyFire.active && (Math.abs(joyFire.x)>.25||Math.abs(joyFire.y)>.25)){
    ax=joyFire.x; ay=joyFire.y;
  }else if(mouse.down || keys[' ']){
    const tx=mouse.x+cam.x, ty=mouse.y+cam.y;
    ax=tx-player.x; ay=ty-player.y;
  }else return;
  const m=Math.hypot(ax,ay)||1;
  bullets.push({x:player.x,y:player.y,dx:ax/m*8.5,dy:ay/m*8.5,r:5,life:90});
  player.face=Math.atan2(ay,ax);
  player.cool=11; sfx.shoot();
}

/* ---------- particles ---------- */
function burst(x,y,color,n=14,sp=3){
  for(let i=0;i<n;i++){ const a=rnd(0,Math.PI*2), s=rnd(.6,sp);
    particles.push({x,y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,life:rnd(20,46),color,r:rnd(1.5,3.5)}); }
}
function floatText(x,y,t,color='#ffd95e'){ floaters.push({x,y,t,color,life:60}); }

/* ---------- update ---------- */
function update(){
  frame++;
  if(shake>0) shake*=0.88;
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    p.x+=p.dx; p.y+=p.dy; p.dy+=.04; if(--p.life<=0) particles.splice(i,1); }
  for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i];
    f.y-=.8; if(--f.life<=0) floaters.splice(i,1); }

  if(state!=='dungeon' && state!=='boss') return;

  /* player move */
  let dx=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
  let dy=(keys['s']||keys['arrowdown']?1:0)-(keys['w']||keys['arrowup']?1:0);
  dx+=joyMove.x; dy+=joyMove.y;
  const m=Math.hypot(dx,dy);
  if(m>0.2){ dx/=Math.max(m,1); dy/=Math.max(m,1); moveCirc(player,dx*player.speed,dy*player.speed);
    if(m>0.2 && !(mouse.down||keys[' ']||joyFire.active)) player.face=Math.atan2(dy,dx); }
  if(player.cool>0)player.cool--;
  if(player.inv>0)player.inv--;
  tryShoot();

  /* camera */
  if(state==='dungeon'){
    cam.x=clamp(player.x-W/2,0,WORLD.w-W);
    cam.y=clamp(player.y-H/2,0,WORLD.h-H);
  }

  /* bullets */
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    b.x+=b.dx; b.y+=b.dy;
    if(--b.life<=0 || inWall(b.x,b.y,b.r)){ burst(b.x,b.y,'#ff8fb3',5,1.6); bullets.splice(i,1); continue; }
    let hit=false;
    for(const mn of minions){
      if(mn.hp>0 && dist(b,mn)<b.r+mn.r){ mn.hp-=12; mn.hitT=6; hit=true; sfx.hit();
        burst(b.x,b.y,'#b14dff',8);
        if(mn.hp<=0){ score+=25; floatText(mn.x,mn.y,'+25'); burst(mn.x,mn.y,'#b14dff',18); sfx.boom(); }
        break; }
    }
    if(!hit && boss && dist(b,boss)<b.r+boss.r){
      boss.hp-=8; hit=true; sfx.hit(); burst(b.x,b.y,'#ff6a3d',10); shake=Math.max(shake,3);
      score+=5;
      if(boss.hp<=boss.maxhp*0.4 && !boss.angry){ boss.angry=true;
        showMsg("ROHIT: 'IMPOSSIBLE!!' — He's furious. Stay sharp! 🔥",3500); }
      if(boss.hp<=0){ winGame(); }
    }
    if(hit) bullets.splice(i,1);
  }
  minions=minions.filter(mn=>mn.hp>0);

  /* enemy bullets */
  for(let i=ebullets.length-1;i>=0;i--){ const b=ebullets[i];
    b.x+=b.dx; b.y+=b.dy;
    if(--b.life<=0 || inWall(b.x,b.y,b.r)){ ebullets.splice(i,1); continue; }
    if(player.inv<=0 && dist(b,player)<b.r+player.r){ damagePlayer(10); ebullets.splice(i,1); }
  }

  /* minions AI */
  for(const mn of minions){
    if(mn.hitT>0)mn.hitT--;
    const d=dist(mn,player);
    if(d<520){
      const a=Math.atan2(player.y-mn.y,player.x-mn.x)+Math.sin(frame/14+mn.wob)*.4;
      moveCirc(mn,Math.cos(a)*mn.speed,Math.sin(a)*mn.speed);
    }
    if(player.inv<=0 && d<mn.r+player.r){ damagePlayer(8);
      const a=Math.atan2(player.y-mn.y,player.x-mn.x);
      moveCirc(player,Math.cos(a)*16,Math.sin(a)*16);
    }
  }
  if(state==='dungeon' && minions.length<6 && frame%160===0) spawnMinion();

  /* treasures */
  if(state==='dungeon'){
    for(const t of treasures){
      if(!t.got && dist(t,player)<26){
        t.got=true; gemsGot++; score+=100; sfx.pick();
        burst(t.x,t.y,'#7af0c0',24); floatText(t.x,t.y,'+100 💎','#7af0c0');
        if(gemsGot<3) showMsg(`Gem ${gemsGot}/3 found! ${3-gemsGot} more hidden somewhere… 👀`,3500);
        else { doorOpen=true; sfx.door(); shake=8;
          showMsg("⚡ ALL GEMS FOUND! The boss door at the TOP of the dungeon grinds open. Go face ROHIT!",6000); }
        updateHud();
      }
    }
    // enter boss door
    if(doorOpen && player.y<bossDoor.y+bossDoor.h+player.r+6 &&
       player.x>bossDoor.x && player.x<bossDoor.x+bossDoor.w){
      setupBoss();
    }
  }

  /* boss AI */
  if(state==='boss' && boss){
    boss.t++;
    const rate=boss.angry?0.7:1;
    // glide side to side, drift toward player
    boss.x+=boss.vx*(boss.angry?1.6:1);
    if(boss.x<90||boss.x>W-90) boss.vx*=-1;
    boss.y+= (player.y-260-boss.y)*0.004;
    // radial burst
    if(boss.t%Math.floor(95*rate)===0){
      const n=boss.angry?14:10, off=rnd(0,Math.PI*2);
      for(let i=0;i<n;i++){ const a=off+i*(Math.PI*2/n);
        ebullets.push({x:boss.x,y:boss.y,dx:Math.cos(a)*3,dy:Math.sin(a)*3,r:7,life:240}); }
      sfx.boom();
    }
    // aimed triple shot
    if(boss.t%Math.floor(60*rate)===30){
      const base=Math.atan2(player.y-boss.y,player.x-boss.x);
      for(const sp of [-0.22,0,0.22])
        ebullets.push({x:boss.x,y:boss.y,dx:Math.cos(base+sp)*4.4,dy:Math.sin(base+sp)*4.4,r:6,life:200});
    }
    // contact damage
    if(player.inv<=0 && dist(boss,player)<boss.r+player.r){ damagePlayer(15);
      const a=Math.atan2(player.y-boss.y,player.x-boss.x);
      moveCirc(player,Math.cos(a)*40,Math.sin(a)*40); }
  }
}

function damagePlayer(amount){
  player.hp-=amount; player.inv=50; shake=Math.max(shake,6); sfx.hurt();
  burst(player.x,player.y,'#ff4d4d',12);
  updateHud();
  if(player.hp<=0){ state='lose'; hud.style.display='none'; msgEl.style.display='none'; }
}
function updateHud(){
  hpbar.style.width=Math.max(0,player.hp/player.maxhp*100)+'%';
  gemsEl.textContent=`💎 ${gemsGot} / 3`;
  scoreEl.textContent=`⭐ ${score}`;
}
function winGame(){
  state='win'; sfx.win(); hud.style.display='none'; msgEl.style.display='none';
  for(let i=0;i<6;i++) setTimeout(()=>burst(rnd(100,W-100),rnd(80,H-200),
    ['#ff5d8f','#ffd95e','#7af0c0','#b14dff'][i%4], 30, 4), i*180);
}
function resetAll(){ score=0; state='title'; boss=null; hud.style.display='none'; msgEl.style.display='none'; }

/* ---------- drawing ---------- */
function rect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function circle(x,y,r,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }

function drawTorch(x,y){
  const fl=Math.sin(frame/5+x)*2;
  rect(x-3,y,6,18,'#5a4632');
  circle(x,y-2+fl*.3,6+fl,'rgba(255,179,71,.25)');
  circle(x,y-2,4,'#ffb347'); circle(x,y-4,2,'#ffe9a8');
}
function drawHeroine(x,y,face,invul){
  if(invul && Math.floor(frame/4)%2===0) ctx.globalAlpha=.45;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.beginPath(); ctx.ellipse(x,y+14,12,5,0,0,7); ctx.fill();
  // dress
  ctx.fillStyle='#ff5d8f'; ctx.beginPath();
  ctx.moveTo(x-10,y+12); ctx.lineTo(x+10,y+12); ctx.lineTo(x+6,y-4); ctx.lineTo(x-6,y-4); ctx.fill();
  // head + hair
  circle(x,y-10,8,'#f1c27d');
  ctx.fillStyle='#2b1b12'; ctx.beginPath(); ctx.arc(x,y-12,8.5,Math.PI*0.95,Math.PI*2.05); ctx.fill();
  rect(x-9,y-12,4,14,'#2b1b12'); rect(x+5,y-12,4,14,'#2b1b12');
  // eyes
  rect(x-4,y-11,2,3,'#1b0f08'); rect(x+2,y-11,2,3,'#1b0f08');
  // blaster pointing at aim
  ctx.save(); ctx.translate(x,y); ctx.rotate(face);
  rect(6,-3,12,6,'#cfd6ff'); rect(16,-2,4,4,'#7af0c0');
  ctx.restore();
  ctx.globalAlpha=1;
}
function drawMinion(mn){
  const w=Math.sin(frame/6+mn.wob)*2;
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(mn.x,mn.y+13,11,4,0,0,7); ctx.fill();
  circle(mn.x,mn.y+w*.3,mn.r, mn.hitT>0?'#ffffff':'#b14dff');
  circle(mn.x-5,mn.y-3+w*.3,3,'#1b0f2a'); circle(mn.x+5,mn.y-3+w*.3,3,'#1b0f2a');
  // angry brows
  ctx.strokeStyle='#1b0f2a'; ctx.lineWidth=2; ctx.beginPath();
  ctx.moveTo(mn.x-9,mn.y-9); ctx.lineTo(mn.x-2,mn.y-6);
  ctx.moveTo(mn.x+9,mn.y-9); ctx.lineTo(mn.x+2,mn.y-6); ctx.stroke();
  // hp pip
  rect(mn.x-12,mn.y-22,24,3,'#2a2440'); rect(mn.x-12,mn.y-22,24*mn.hp/mn.maxhp,3,'#ff4d4d');
}
function drawRohit(b){
  const bob=Math.sin(frame/9)*4;
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.beginPath(); ctx.ellipse(b.x,b.y+44,34,9,0,0,7); ctx.fill();
  // cape
  ctx.fillStyle=b.angry?'#7a1020':'#3a1050'; ctx.beginPath();
  ctx.moveTo(b.x-34,b.y-20+bob); ctx.quadraticCurveTo(b.x-50,b.y+40+bob,b.x-20,b.y+40+bob);
  ctx.lineTo(b.x+20,b.y+40+bob); ctx.quadraticCurveTo(b.x+50,b.y+40+bob,b.x+34,b.y-20+bob); ctx.fill();
  // body
  circle(b.x,b.y+bob,b.r, b.angry?'#c8333f':'#6a3aa0');
  // face
  circle(b.x,b.y-10+bob,20,'#e8b88a');
  // villain moustache
  ctx.strokeStyle='#1b0f08'; ctx.lineWidth=3; ctx.beginPath();
  ctx.moveTo(b.x-2,b.y-3+bob); ctx.quadraticCurveTo(b.x-14,b.y-6+bob,b.x-16,b.y-12+bob);
  ctx.moveTo(b.x+2,b.y-3+bob); ctx.quadraticCurveTo(b.x+14,b.y-6+bob,b.x+16,b.y-12+bob); ctx.stroke();
  // angry eyes
  rect(b.x-11,b.y-16+bob,6,4,'#400'); rect(b.x+5,b.y-16+bob,6,4,'#400');
  ctx.strokeStyle='#400'; ctx.lineWidth=3; ctx.beginPath();
  ctx.moveTo(b.x-15,b.y-22+bob); ctx.lineTo(b.x-4,b.y-18+bob);
  ctx.moveTo(b.x+15,b.y-22+bob); ctx.lineTo(b.x+4,b.y-18+bob); ctx.stroke();
  // crown (he thinks he's a king)
  ctx.fillStyle='#ffd95e'; ctx.beginPath();
  ctx.moveTo(b.x-16,b.y-28+bob); ctx.lineTo(b.x-16,b.y-40+bob); ctx.lineTo(b.x-8,b.y-32+bob);
  ctx.lineTo(b.x,b.y-42+bob); ctx.lineTo(b.x+8,b.y-32+bob); ctx.lineTo(b.x+16,b.y-40+bob);
  ctx.lineTo(b.x+16,b.y-28+bob); ctx.fill();
  // name tag
  ctx.font='bold 13px monospace'; ctx.fillStyle='#ffd95e'; ctx.textAlign='center';
  ctx.fillText('ROHIT', b.x, b.y+62+bob);
}
function drawGem(x,y){
  const tw=Math.sin(frame/8+x)*2;
  ctx.save(); ctx.translate(x,y+tw); ctx.rotate(Math.sin(frame/30)*0.15);
  ctx.fillStyle='#7af0c0'; ctx.beginPath();
  ctx.moveTo(0,-12); ctx.lineTo(10,-2); ctx.lineTo(0,12); ctx.lineTo(-10,-2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath();
  ctx.moveTo(0,-12); ctx.lineTo(5,-3); ctx.lineTo(-5,-3); ctx.fill();
  ctx.restore();
  circle(x+Math.sin(frame/7)*14, y-14+Math.cos(frame/9)*6, 1.6, '#fff');
}

function drawCageScene(){
  // dungeon cell backdrop
  rect(0,0,W,H,'#141021');
  rect(0,H-110,W,110,'#1c1830');
  for(let i=0;i<10;i++) rect(i*100+20,H-108,60,4,'#262040');
  drawTorch(120,120); drawTorch(W-120,120);
  ctx.font='bold 26px monospace'; ctx.fillStyle='#f6ecd9'; ctx.textAlign='center';
  ctx.fillText("ROHIT's PRISON CELL", W/2, 70);
  ctx.font='13px monospace'; ctx.fillStyle='#9a90c0';
  ctx.fillText(keyFound? "" : "search the glowing objects for the key…", W/2, 96);

  // search objects
  for(const s of spots){
    const glow=s.searched?0:(Math.sin(frame/10+s.x)*.5+.5);
    if(!s.searched){ circle(s.x,s.y,s.r+8+glow*6,'rgba(255,217,94,'+(0.08+glow*0.1)+')'); }
    ctx.globalAlpha=s.searched?0.45:1;
    if(s.type==='skull'){ circle(s.x,s.y,16,'#d8d0c0'); circle(s.x-5,s.y-2,4,'#141021'); circle(s.x+5,s.y-2,4,'#141021'); rect(s.x-8,s.y+8,16,6,'#d8d0c0'); }
    if(s.type==='barrel'){ rect(s.x-16,s.y-20,32,40,'#7a5230'); rect(s.x-18,s.y-12,36,5,'#4a3018'); rect(s.x-18,s.y+6,36,5,'#4a3018'); }
    if(s.type==='rock'){ circle(s.x,s.y,18,'#5a5468'); circle(s.x-6,s.y-6,7,'#6a6480'); }
    if(s.type==='bones'){ ctx.strokeStyle='#d8d0c0'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(s.x-14,s.y-10); ctx.lineTo(s.x+14,s.y+10); ctx.moveTo(s.x-14,s.y+10); ctx.lineTo(s.x+14,s.y-10); ctx.stroke(); circle(s.x-14,s.y-10,5,'#d8d0c0'); circle(s.x+14,s.y+10,5,'#d8d0c0'); circle(s.x-14,s.y+10,5,'#d8d0c0'); circle(s.x+14,s.y-10,5,'#d8d0c0'); }
    if(s.type==='pot'){ ctx.fillStyle='#a0622d'; ctx.beginPath(); ctx.ellipse(s.x,s.y+4,16,14,0,0,7); ctx.fill(); rect(s.x-10,s.y-14,20,8,'#824e22'); }
    ctx.globalAlpha=1;
    if(s.searched && s.hasKey){
      ctx.font='20px monospace'; ctx.fillText('🔑', s.x, s.y-30);
    }
  }
  // heroine
  drawHeroine(player.x, player.y, -Math.PI/2, false);
  ctx.font='12px monospace'; ctx.fillStyle='#ff8fb3'; ctx.textAlign='center';
  ctx.fillText('VAISHNA', player.x, player.y+34);

  // cage bars (slide up when open)
  const lift = cageOpen ? Math.min((frame%100000), 1)*0 : 0;
  if(!cageOpen){
    ctx.strokeStyle='#8d97b8'; ctx.lineWidth=8;
    for(let i=0;i<=8;i++){ const bx=80+i*((W-160)/8);
      ctx.beginPath(); ctx.moveTo(bx,130); ctx.lineTo(bx,H-60); ctx.stroke(); }
    ctx.strokeRect(80,130,W-160,H-190);
  } else {
    ctx.strokeStyle='rgba(141,151,184,.3)'; ctx.lineWidth=8;
    ctx.strokeRect(80,40,W-160,40);
  }
}

function drawDungeon(){
  ctx.save(); ctx.translate(-cam.x+rnd(-shake,shake), -cam.y+rnd(-shake,shake));
  // floor
  rect(0,0,WORLD.w,WORLD.h,'#171327');
  ctx.fillStyle='#1d1830';
  for(let gx=0; gx<WORLD.w; gx+=92) for(let gy=0; gy<WORLD.h; gy+=92)
    if((gx/92+gy/92)%2===0) ctx.fillRect(gx,gy,92,92);
  // walls
  for(const w of walls){ rect(w.x,w.y,w.w,w.h,'#332a52'); rect(w.x,w.y,w.w,6,'#473a6e'); }
  // boss door
  if(state==='dungeon'){
    rect(bossDoor.x,bossDoor.y,bossDoor.w,bossDoor.h+14, doorOpen?'#10261c':'#552233');
    ctx.strokeStyle=doorOpen?'#7af0c0':'#ff5d8f'; ctx.lineWidth=3;
    ctx.strokeRect(bossDoor.x,bossDoor.y,bossDoor.w,bossDoor.h+14);
    ctx.font='bold 12px monospace'; ctx.fillStyle=doorOpen?'#7af0c0':'#ff8fb3'; ctx.textAlign='center';
    ctx.fillText(doorOpen?'▲ ENTER — ROHIT AWAITS ▲':'🔒 ROHIT\'S LAIR — need 3 gems',
      bossDoor.x+bossDoor.w/2, bossDoor.y+bossDoor.h+34);
    drawTorch(bossDoor.x-20,bossDoor.y+30); drawTorch(bossDoor.x+bossDoor.w+20,bossDoor.y+30);
  }
  // treasures (sparkle hint when near)
  for(const t of treasures){
    if(t.got) continue;
    const d=dist(t,player);
    if(d<420) drawGem(t.x,t.y);
    if(d>=420 && d<640 && frame%30<15){
      circle(t.x+rnd(-6,6), t.y+rnd(-6,6), 1.8, 'rgba(122,240,192,.8)');
    }
  }
  for(const mn of minions) drawMinion(mn);
  for(const b of bullets) circle(b.x,b.y,b.r,'#ff8fb3');
  for(const b of ebullets) circle(b.x,b.y,b.r,'#ff6a3d');
  drawHeroine(player.x,player.y,player.face,player.inv>0);
  drawParticlesWorld();
  ctx.restore();
}

function drawBossArena(){
  ctx.save(); ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  rect(0,0,W,H,'#1a0f1f');
  ctx.fillStyle='#221428';
  for(let gx=0;gx<W;gx+=80) for(let gy=0;gy<H;gy+=80)
    if((gx/80+gy/80)%2===0) ctx.fillRect(gx,gy,80,80);
  for(const w of walls) rect(w.x,w.y,w.w,w.h,'#3d2447');
  drawTorch(70,80); drawTorch(W-70,80); drawTorch(70,H-80); drawTorch(W-70,H-80);
  if(boss){
    drawRohit(boss);
    // boss hp bar
    rect(W/2-220,28,440,16,'#2a2440');
    rect(W/2-220,28,440*Math.max(0,boss.hp)/boss.maxhp,16, boss.angry?'#ff4d4d':'#b14dff');
    ctx.strokeStyle='#f6ecd9'; ctx.lineWidth=2; ctx.strokeRect(W/2-220,28,440,16);
    ctx.font='bold 12px monospace'; ctx.fillStyle='#f6ecd9'; ctx.textAlign='center';
    ctx.fillText('ROHIT — THE CAGE KING', W/2, 22);
  }
  for(const b of bullets) circle(b.x,b.y,b.r,'#ff8fb3');
  for(const b of ebullets){ circle(b.x,b.y,b.r,'#ff6a3d'); circle(b.x,b.y,b.r*.5,'#ffd95e'); }
  drawHeroine(player.x,player.y,player.face,player.inv>0);
  drawParticlesWorld();
  ctx.restore();
}

function drawParticlesWorld(){
  for(const p of particles) circle(p.x,p.y,p.r,p.color);
  ctx.font='bold 14px monospace'; ctx.textAlign='center';
  for(const f of floaters){ ctx.fillStyle=f.color; ctx.globalAlpha=f.life/60; ctx.fillText(f.t,f.x,f.y); }
  ctx.globalAlpha=1;
}

function drawTitle(){
  rect(0,0,W,H,'#0b0a12');
  // twinkles
  for(let i=0;i<40;i++){ const x=(i*97)%W, y=(i*173)%H;
    circle(x,y,(Math.sin(frame/20+i)+1.4), 'rgba(255,255,255,'+(0.05+(i%5)*0.02)+')'); }
  drawTorch(140,200); drawTorch(W-140,200);
  ctx.textAlign='center';
  ctx.font='bold 16px monospace'; ctx.fillStyle='#9a90c0';
  ctx.fillText('A LEGEND IS BORN…', W/2, 150);
  ctx.font='bold 44px monospace'; ctx.fillStyle='#ff5d8f';
  ctx.fillText("VAISHNA'S", W/2, 230);
  ctx.font='bold 52px monospace'; ctx.fillStyle='#ffd95e';
  ctx.fillText('GREAT ESCAPE', W/2, 290);
  ctx.font='14px monospace'; ctx.fillStyle='#f6ecd9';
  ctx.fillText('Trapped in ROHIT\'s cage… but not for long. 😤', W/2, 340);
  ctx.fillText('🔑 Find the key  •  💎 Hunt 3 hidden gems  •  ⚔️ Defeat ROHIT', W/2, 372);
  ctx.font='12px monospace'; ctx.fillStyle='#9a90c0';
  ctx.fillText('PC: WASD/arrows to move • mouse aim + click (or SPACE) to shoot', W/2, 430);
  ctx.fillText('Phone: left stick = move • right stick = shoot • tap to search', W/2, 452);
  const pulse=Math.sin(frame/12)*.5+.5;
  ctx.font='bold 20px monospace'; ctx.fillStyle=`rgba(122,240,192,${0.5+pulse*0.5})`;
  ctx.fillText('▶ TAP / CLICK TO BEGIN ◀', W/2, 520);
  drawHeroine(W/2, 480-18, -Math.PI/2, false);
}

function drawWin(){
  rect(0,0,W,H,'#120a18');
  // confetti rain
  for(let i=0;i<60;i++){
    const x=(i*53+frame*((i%3)+1))%W, y=(i*91+frame*((i%4)+2))%H;
    rect(x,y,5,9,['#ff5d8f','#ffd95e','#7af0c0','#b14dff'][i%4]);
  }
  ctx.textAlign='center';
  ctx.font='bold 46px monospace'; ctx.fillStyle='#ffd95e';
  ctx.fillText('🏆 VAISHNA ESCAPED! 🏆', W/2, 170);
  ctx.font='bold 22px monospace'; ctx.fillStyle='#ff8fb3';
  ctx.fillText('ROHIT defeated. Cage destroyed. Crown yoinked. 👑', W/2, 225);
  ctx.font='16px monospace'; ctx.fillStyle='#f6ecd9';
  ctx.fillText(`Final score: ⭐ ${score}`, W/2, 275);
  ctx.font='bold 18px monospace'; ctx.fillStyle='#7af0c0';
  ctx.fillText('Official verdict:', W/2, 340);
  ctx.fillStyle='#f6ecd9'; ctx.font='16px monospace';
  ctx.fillText('Vaishna — too strong for any cage,', W/2, 372);
  ctx.fillText('too smart for any villain. ❤️', W/2, 398);
  drawHeroine(W/2,460,-Math.PI/2,false);
  ctx.font='bold 28px monospace'; ctx.fillStyle='#ffd95e';
  ctx.fillText('👑', W/2, 432);
  const pulse=Math.sin(frame/12)*.5+.5;
  ctx.font='14px monospace'; ctx.fillStyle=`rgba(154,144,192,${0.5+pulse*0.5})`;
  ctx.fillText('tap / click to play again', W/2, 545);
  for(const p of particles) circle(p.x,p.y,p.r,p.color);
}

function drawLose(){
  rect(0,0,W,H,'#160b0b');
  ctx.textAlign='center';
  ctx.font='bold 40px monospace'; ctx.fillStyle='#ff4d4d';
  ctx.fillText('CAUGHT BY ROHIT!', W/2, 220);
  ctx.font='16px monospace'; ctx.fillStyle='#f6ecd9';
  ctx.fillText('But legends don\'t stay down…', W/2, 270);
  ctx.fillText(`Score: ⭐ ${score}`, W/2, 305);
  const pulse=Math.sin(frame/12)*.5+.5;
  ctx.font='bold 18px monospace'; ctx.fillStyle=`rgba(122,240,192,${0.5+pulse*0.5})`;
  ctx.fillText('▶ TAP / CLICK TO TRY AGAIN ◀', W/2, 380);
}

/* ---------- main loop ---------- */
function loop(){
  update();
  if(state==='title') drawTitle();
  else if(state==='cage'){ drawCageScene(); for(const p of particles) circle(p.x,p.y,p.r,p.color); }
  else if(state==='dungeon') drawDungeon();
  else if(state==='boss') drawBossArena();
  else if(state==='win') drawWin();
  else if(state==='lose') drawLose();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
